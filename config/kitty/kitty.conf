# Hypr Dark Frost X Kitty — edit freely; colors/fonts sync via sync-kitty-hypr-dark-frost-xdotfiles

include hypr-dark-frost-xdotfiles-generated.conf

# Font (sync-kitty-hypr-dark-frost-xdotfiles updates these when shell theme changes)
font_family JetBrainsMono Nerd Font Mono
bold_font auto
italic_font auto
font_size 14.0

# Layout
window_padding_width    10
window_margin_width     0
placement_strategy      center
hide_window_decorations yes
confirm_os_window_close 0
remember_window_size    yes
initial_window_width    920
initial_window_height   560

# Frosted glass — semi-transparent Kitty + Hyprland compositor blur (Ambxst)
background_opacity         0.88
dynamic_background_opacity yes
background_tint            0.90
background_tint_gaps       1.0

# Cursor
cursor_shape                 beam
cursor_beam_thickness        1.5
cursor_blink_interval        0.5
cursor_stop_blinking_after   15.0

# Scrollback & performance
scrollback_lines         20000
scrollback_pager         less --chop-long-lines --RAW-control-chars +G -R
wheel_scroll_min_lines   3
repaint_delay            10
input_delay              3
sync_to_monitor          yes

# Tabs — minimal, matches Ambxst chrome
enabled_layouts          all
tab_bar_style            slant
tab_bar_min_tabs         2
tab_bar_edge             top
tab_bar_align            left
tab_powerline_style      slanted
tab_title_template       "{title.split('/')[-1]}"
active_tab_font_style    bold
inactive_tab_font_style  normal

# Splits & hints
window_border_width  0
draw_minimal_borders yes

# Shell
shell_integration             enabled
allow_hyperlinks              yes
url_style                     curly
open_url_with                 default
copy_on_select                none
strip_trailing_spaces         smart
select_by_word_characters     @-./_~?&=%+#

# Bell
enable_audio_bell no
visual_bell_duration 0.0

# Keyboard (Hyprland-friendly)
clear_all_shortcuts no
kitty_mod ctrl+shift

map kitty_mod+enter new_window
map kitty_mod+n new_os_window
map kitty_mod+w close_window
map kitty_mod+] next_window
map kitty_mod+[ previous_window
map kitty_mod+f move_window_forward
map kitty_mod+b move_window_backward
map kitty_mod+` move_window_to_top
map kitty_mod+r start_resizing_window
map kitty_mod+1 first_window
map kitty_mod+9 last_window
map kitty_mod+0 tenth_window

# Clipboard
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard
map ctrl+shift+s paste_from_selection
map ctrl+shift+o pass_selection_to_program

# Font size
map ctrl+shift+equal change_font_size all +1.0
map ctrl+shift+minus change_font_size all -1.0
map ctrl+shift+0 change_font_size all 0

# Scroll
map ctrl+shift+page_up scroll_line_up
map ctrl+shift+page_down scroll_line_down
map ctrl+shift+home scroll_home
map ctrl+shift+end scroll_end

# Wayland
wayland_enable yes
